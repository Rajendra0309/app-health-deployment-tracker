name: CI/CD Pipeline - App Health Tracker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set deployment variables
        run: |
          echo "APP_VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "DEPLOYED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "app-health-deployment-tracker" ]; then
              git clone https://github.com/${{ github.repository }}.git
            fi

            cd app-health-deployment-tracker
            git pull origin main

            docker stop app-health-tracker || true
            docker rm app-health-tracker || true

            docker build -t app-health-tracker .

            docker run -d \
              --name app-health-tracker \
              -p 3000:3000 \
              -e APP_VERSION=${{ env.APP_VERSION }} \
              -e ENVIRONMENT=production \
              -e DEPLOYED_AT=${{ env.DEPLOYED_AT }} \
              app-health-tracker